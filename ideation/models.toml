# mistral.rs multi-model server for the ideation loop (Mac / Metal).
#   mistralrs from-config -f models.toml
command = "serve"
default_model_id = "lamm-mit/Graph-Preflexor-3b_08012026"   # generator = default

[server]
host = "0.0.0.0"
port = 1234

# Generator — Graph-PRefLexOR (Q8 keeps quality; it's small)
[[models]]
kind = "text"
model_id = "lamm-mit/Graph-Preflexor-3b_08012026"
[models.quantization]
in_situ_quant = "8"

# Questioner — Qwen3-8B (Q4 to share Metal memory)
[[models]]
kind = "text"
model_id = "Qwen/Qwen3-0.6B" # "Qwen/Qwen3-8B"
[models.quantization]
in_situ_quant = "4"
