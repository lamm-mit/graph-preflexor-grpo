# mistral.rs multi-model server for the ideation loop (Mac / Metal).
#   mistralrs from-config -f models.toml
command = "serve"
default_model_id = "lamm-mit/Graph-Preflexor-3b_08012026"   # generator = default

[server]
host = "0.0.0.0"
port = 1234

[runtime]
# Required for OpenAI-compatible Skills and Responses tools[*].type="shell".
# Start with: mistralrs from-config -f models.toml
# Agent mode is the mistral.rs shortcut for search + code execution + shell.
agent = true
shell_timeout = 120

# Generator — Graph-PRefLexOR (Q8 keeps quality; it's small)
[[models]]
kind = "text"
model_id = "lamm-mit/Graph-Preflexor-3b_08012026"
[models.quantization]
in_situ_quant = "Q8_0" #"HQQ8"


# Generator — Graph-PRefLexOR (1.7B)
[[models]]
kind = "text"
model_id = "lamm-mit/Graph-Preflexor-1.7b_08012026"
[models.quantization]
in_situ_quant = "Q8_0" #"HQQ8"

# Questioner + graph explorer chat — Gemma on the same mistral.rs endpoint.
#[[models]]
#kind = "text"
#model_id = "meta-llama/Llama-3.2-3B-Instruct" #"google/gemma-4-E4B-it"
#[models.quantization]
#in_situ_quant = "8"
 
# Questioner + graph explorer chat — Gemma on the same mistral.rs endpoint.
[[models]]
kind = "auto"
model_id = "google/gemma-4-E4B-it"
[models.quantization]
in_situ_quant = "8"
